<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Placar IFPR</title>

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      color: #00ffcc;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #111827;
      border-radius: 15px;
      padding: 15px;
      width: 180px;
      box-shadow: 0 0 15px rgba(0,255,200,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .top {
      border: 2px solid gold;
      box-shadow: 0 0 20px gold;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    .nome {
      font-size: 18px;
      margin: 10px 0;
    }

    .stats {
      font-size: 14px;
      color: #9ca3af;
    }
  </style>
</head>

<body>

  <h1>⚽ Placar IFPR</h1>

  <div class="container" id="ranking"></div>

  <script>
    const jogadores = [
      {nome: "Felipe", time: "Time 1", gols: 5, assistencias: 2, foto: "img/felipe.jpg"},
      {nome: "João", time: "Time 2", gols: 3, assistencias: 4, foto: "img/joao.jpg"},
      {nome: "Carlos", time: "Time 1", gols: 7, assistencias: 1, foto: "img/carlos.jpg"}
    ];

    jogadores.sort((a, b) => b.gols - a.gols);

    const ranking = document.getElementById("ranking");

    jogadores.forEach((j, index) => {
      const div = document.createElement("div");
      div.classList.add("card");

      if(index === 0){
        div.classList.add("top");
      }

      div.innerHTML = `
        <img src="${j.foto}">
        <div class="nome">${j.nome}</div>
        <div class="stats">⚽ ${j.gols} | 🎯 ${j.assistencias}</div>
        <div class="stats">${j.time}</div>
      `;

      ranking.appendChild(div);
    });
  </script>

</body>
</html>
