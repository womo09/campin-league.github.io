<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDbi2hDWmR6yw0AoA7dpTlZEWtP7Vw7F4w",
    authDomain: "placar-ifpr.firebaseapp.com",
    projectId: "placar-ifpr",
    storageBucket: "placar-ifpr.firebasestorage.app",
    messagingSenderId: "660088722534",
    appId: "1:660088722534:web:6ffb8e3075fb5ccca789a7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function salvar() {
    const nome = document.getElementById("nome").value;
    const velocidade = document.getElementById("velocidade").value;
    const chute = document.getElementById("chute").value;

    await addDoc(collection(db, "jogadores"), {
      nome,
      velocidade,
      chute
    });

    alert("Jogador salvo!");
    carregar();
  }

  async function carregar() {
    const querySnapshot = await getDocs(collection(db, "jogadores"));
    const div = document.getElementById("perfil");

    div.innerHTML = "";

    querySnapshot.forEach((doc) => {
      const j = doc.data();

      div.innerHTML += `
        <div class="card">
          <h2>${j.nome}</h2>
          <p>⚡ ${j.velocidade}</p>
          <p>💥 ${j.chute}</p>
        </div>
      `;
    });
  }

  window.salvar = salvar;

  carregar();
</script>
