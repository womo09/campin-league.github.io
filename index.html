<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Placar IFPR</title>

<style>
body {
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  font-family: Arial;
  text-align: center;
}

/* MENU */
.menu {
  background: #111827;
  padding: 10px;
  display: flex;
  justify-content: center;
  gap: 20px;
  position: sticky;
  top: 0;
}

.menu button {
  background: transparent;
  color: white;
  border: 1px solid #00ffcc;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* INPUTS */
input, select {
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  width: 200px;
}

button {
  padding: 10px;
  margin-top: 10px;
  background: #00ffcc;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* CARDS */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}

.card {
  width: 220px;
  background: #111827;
  border-radius: 15px;
  padding: 15px;
  position: relative;
}

.top {
  border: 2px solid gold;
}

img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
}

.overall {
  position: absolute;
  top: 10px;
  left: 10px;
  color: gold;
  font-size: 20px;
}

.delete {
  position: absolute;
  top: 10px;
  right: 10px;
  background: red;
  border: none;
  color: white;
  border-radius: 50%;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
  <button onclick="mostrarTela('jogadores')">👤 Jogadores</button>
  <button onclick="mostrarTela('partidas')">⚽ Partidas</button>
</div>

<!-- TELA JOGADORES -->
<div id="tela-jogadores">

<h1>⚽ Criar Jogador</h1>

<input id="nome" placeholder="Nome"><br>
<input type="number" id="gols" placeholder="Gols"><br>
<input type="number" id="assistencias" placeholder="Assistências"><br>

<select id="posicao">
  <option>ATA</option>
  <option>MEI</option>
  <option>ZAG</option>
  <option>GOL</option>
</select><br>

<input type="file" id="foto"><br>

<button onclick="salvar()">Salvar</button>

<div class="container" id="perfil"></div>

</div>

<!-- TELA PARTIDAS -->
<div id="tela-partidas" style="display:none;">
  <h1>⚽ Partidas</h1>

  <input type="number" id="time1" placeholder="Gols Time 1"><br>
  <input type="number" id="time2" placeholder="Gols Time 2"><br>

  <button onclick="salvarPartida()">Salvar Partida</button>

  <div id="listaPartidas"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbi2hDWmR6yw0AoA7dpTlZEWtP7Vw7F4w",
  authDomain: "placar-ifpr.firebaseapp.com",
  projectId: "placar-ifpr",
  storageBucket: "placar-ifpr.firebasestorage.app",
  messagingSenderId: "660088722534",
  appId: "1:660088722534:web:6ffb8e3075fb5ccca789a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SENHA_ADMIN = "1234";

function limitar(v) {
  return Math.max(0, Math.min(100, v));
}

function overall(v, c) {
  return Math.round((v + c) / 2);
}

window.mostrarTela = function(tela) {
  document.getElementById("tela-jogadores").style.display = "none";
  document.getElementById("tela-partidas").style.display = "none";

  document.getElementById("tela-" + tela).style.display = "block";
}

async function salvar() {
  const nome = document.getElementById("nome").value;
  let gols = Number(document.getElementById("gols").value) || 0;
let assistencias = Number(document.getElementById("assistencias").value) || 0;
  const posicao = document.getElementById("posicao").value;

  const file = document.getElementById("foto").files[0];

  if (file) {
    const reader = new FileReader();
    reader.onload = async function() {
      salvarBanco(nome, gols, assistencias, posicao, reader.result);
    };
    reader.readAsDataURL(file);
  } else {
    salvarBanco(nome, gols, assistencias, posicao, "");
  }
}

async function salvarBanco(nome, gols, assistencias, posicao, foto) {
  await addDoc(collection(db, "jogadores"), {
    nome, gols, assistencias, posicao, foto
  });

  carregar();
}

async function apagar(id) {
  const senha = prompt("Senha para apagar:");

  if (senha !== SENHA_ADMIN) {
    alert("Senha incorreta");
    return;
  }

  await deleteDoc(doc(db, "jogadores", id));
  carregar();
}

async function carregar() {
  const querySnapshot = await getDocs(collection(db, "jogadores"));
  const div = document.getElementById("perfil");

  div.innerHTML = "";

  let jogadores = [];

  querySnapshot.forEach((d) => {
    jogadores.push({ id: d.id, ...d.data() });
  });

  jogadores.sort((a, b) => overall(b.gols, b.assistencias) - overall(a.velocidade, a.chute));

  jogadores.forEach((j, index) => {
    div.innerHTML += `
      <div class="card ${index === 0 ? "top" : ""}">
        <button class="delete" onclick="apagar('${j.id}')">X</button>
        <div class="overall">${(j.gols || 0) + (j.assistencias || 0)}</div>
        <img src="${j.foto || ""}">
        <h2>${j.nome}</h2>
        <p>${j.posicao}</p>
        <p>⚽ ${j.gols || 0}</p>
        <p>🎯 ${j.assistencias || 0}</p>
      </div>
    `;
  });
}

// 👇 FUNÇÕES DE PARTIDA (cola aqui)

async function salvarPartida() {
  const time1 = Number(document.getElementById("time1").value);
  const time2 = Number(document.getElementById("time2").value);

  if (isNaN(time1) || isNaN(time2)) {
    alert("Preencha os gols corretamente!");
    return;
  }

  await addDoc(collection(db, "partidas"), {
    time1,
    time2,
    data: new Date()
  });

  carregarPartidas();
}

async function carregarPartidas() {
  const querySnapshot = await getDocs(collection(db, "partidas"));
  const div = document.getElementById("listaPartidas");

  div.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const p = { id: doc.id, ...doc.data() };
    const data = new Date(p.data.seconds * 1000);

   div.innerHTML += `
  <div class="card">
    <button class="delete" onclick="apagarPartida('${p.id}')">X</button>

    <button onclick="editarPartida('${p.id}', ${p.time1}, ${p.time2})">✏️</button>

    <button onclick="adicionarGol('${p.id}')">⚽</button>

    <h2>Time 1 ${p.time1} x ${p.time2} Time 2</h2>
    <p>${data.toLocaleDateString()}</p>

    <p>
      ${(p.gols || []).map(g => 
        `⚽ ${g.jogador} (${g.assist || "sem assist"})`
      ).join("<br>")}
    </p>
  </div>
`;
  });
}
  
async function editarPartida(id, t1, t2) {
  const novo1 = prompt("Novo placar Time 1:", t1);
  const novo2 = prompt("Novo placar Time 2:", t2);

  if (novo1 === null || novo2 === null) return;

  await updateDoc(doc(db, "partidas", id), {
    time1: Number(novo1),
    time2: Number(novo2)
  });

  carregarPartidas();
}

  async function apagarPartida(id) {
  const senha = prompt("Senha para apagar:");

  if (senha !== SENHA_ADMIN) {
    alert("Senha incorreta");
    return;
  }

  await deleteDoc(doc(db, "partidas", id));
  carregarPartidas();
}
  
  async function adicionarGol(id) {
  const jogador = prompt("Quem fez o gol?");
  const assist = prompt("Assistência (opcional):");

  const ref = doc(db, "partidas", id);

  await updateDoc(ref, {
    gols: arrayUnion({
      jogador,
      assist
    })
  });

  carregarPartidas();
}
  
// 👇 AGORA ESSA PARTE FICA NO FINAL
window.salvar = salvar;
window.apagar = apagar;
window.salvarPartida = salvarPartida;
window.apagarPartida = apagarPartida;
window.editarPartida = editarPartida;
window.adicionarGol = adicionarGol;

carregar();
carregarPartidas();

</script>

</body>
</html>
